name: shiji-crawl

on:
  schedule:
    # GitHub cron 은 UTC. KST = UTC+9.
    # KST 10:00~22:00 매시 정각 = UTC 01:00~13:00
    - cron: "0 1-13 * * *"
  workflow_dispatch: {}   # 수동 실행 버튼

# 중복 실행 방지: 이전 실행이 끝날 때까지 새 실행 대기 (취소 안 함)
concurrency:
  group: shiji-crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    # 크롤은 shijicloud 가 동시요청을 거부해 순차로만 가능 → ~22~25분 소요.
    # 25분 한도에선 후처리 직전 잘려 cancelled 되므로 여유 있게 40분으로.
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 의존성 설치 (+ chromium)
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: 구글 OAuth 토큰 파일 복원
        env:
          TOKEN_SHEETS_JSON: ${{ secrets.TOKEN_SHEETS_JSON }}
        run: printf '%s' "$TOKEN_SHEETS_JSON" > token_sheets.json

      - name: 수집 실행
        env:
          SHIJI_ID: ${{ secrets.SHIJI_ID }}
          SHIJI_PW: ${{ secrets.SHIJI_PW }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          ADULTS: "2"
          CHILDREN: "0"
          SINK: sheet
        run: python run_once.py
